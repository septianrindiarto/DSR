<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - Car Rental App</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff0008",
                        "primary-hover": "#d40007",
                        "primary-light": "#ffe5e6",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header / Branding -->
<header class="flex items-center justify-between px-10 py-4 border-b border-primary/10 bg-white/50 dark:bg-black/20 backdrop-blur-sm">
<div class="flex items-center gap-3">
<div class="size-8 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">directions_car</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Rental<span class="text-primary">Admin</span></h1>
</div>
<!-- Optional: Profile or Help placeholder -->
<div class="flex items-center gap-4">
<button class="text-sm font-medium text-slate-500 hover:text-primary transition-colors">Help Center</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-4 sm:p-8">
<div class="w-full max-w-md bg-white dark:bg-[#2a1212] rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-primary/10 dark:border-primary/20 overflow-hidden">
<!-- Card Header -->
<div class="pt-10 pb-6 px-8 text-center">
<div class="inline-flex items-center justify-center size-16 rounded-full bg-primary/10 text-primary mb-6">
<span class="material-symbols-outlined text-3xl">admin_panel_settings</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Admin Portal</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Enter your credentials to access the dashboard</p>
</div>
<!-- Login Form -->
<form class="px-8 pb-10 flex flex-col gap-5">
<!-- Username Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="username">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#381a1a] text-slate-900 dark:text-white pl-10 pr-4 py-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all outline-none" id="username" placeholder="admin@company.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-hover" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#381a1a] text-slate-900 dark:text-white pl-10 pr-10 py-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-2 bg-primary hover:bg-primary-hover text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm active:scale-[0.98] flex items-center justify-center gap-2 group" type="button">
<span>LOGIN</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Footer Links -->
<div class="text-center mt-4">
<p class="text-xs text-slate-400 dark:text-slate-500">
                        Protected by reCAPTCHA and subject to the 
                        <a class="underline hover:text-slate-600 dark:hover:text-slate-300" href="#">Privacy Policy</a>
                        and
                        <a class="underline hover:text-slate-600 dark:hover:text-slate-300" href="#">Terms of Service</a>.
                    </p>
</div>
</form>
</div>
</main>
<!-- Simple Footer -->
<footer class="py-6 text-center text-sm text-slate-400 dark:text-slate-600">
        © 2024 Rental Mobil MVP. All rights reserved.
    </footer>
</body></html>
